name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  EVAL_THRESHOLD_R2: "0.75"

jobs:
  # ─── ML ─────────────────────────────────────────────────────────────
  ml:
    name: ML Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv sync
          uv pip install joblib xgboost scikit-learn pandas numpy

      - name: Train model
        env:
          MODEL_PATH: ml/model.pkl
        run: uv run python ml/train.py

      - name: Verify model artifact
        run: |
          if [ ! -f ml/model.pkl ]; then
            echo "ERROR: ml/model.pkl not found after training"
            exit 1
          fi
          echo "ml/model.pkl exists ($(stat -c%s ml/model.pkl) bytes)"

      - name: Verify model integrity (SHA-256)
        run: |
          if [ -f ml/model.pkl.sha256 ]; then
            computed=$(sha256sum ml/model.pkl | cut -d' ' -f1)
            expected=$(cat ml/model.pkl.sha256)
            if [ "$computed" != "$expected" ]; then
              echo "ERROR: SHA-256 mismatch"
              echo "  Expected: $expected"
              echo "  Got:      $computed"
              exit 1
            fi
            echo "SHA-256 integrity check passed"
          else
            echo "WARNING: ml/model.pkl.sha256 not found — generating"
            sha256sum ml/model.pkl | cut -d' ' -f1 > ml/model.pkl.sha256
          fi

      - name: Evaluate model (accuracy gate + ratchet + fixtures)
        env:
          MODEL_PATH: ml/model.pkl
        run: uv run python ml/evaluate.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-pkl
          path: ml/model.pkl
          retention-days: 7

      - name: Upload model hash
        uses: actions/upload-artifact@v4
        with:
          name: model-pkl-sha256
          path: ml/model.pkl.sha256
          retention-days: 7

  # ─── BACKEND ─────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [ml]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: ml/

      - name: Install dependencies
        run: |
          cd ..
          uv sync
          uv pip install flake8
          cd backend

      - name: Lint with flake8
        run: |
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exit-zero
          uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          if [ -d tests ]; then
            uv run pytest tests/ -v --junitxml=test-results.xml
          else
            echo "WARNING: tests/ directory not found — skipping tests"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 7

  # ─── FRONTEND ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "WARNING: frontend/package.json not found — skipping"
            exit 0
          fi

      - name: Lint
        run: |
          if [ -f package.json ]; then
            npm run lint 2>/dev/null || echo "No lint script defined"
          fi

      - name: Type check
        run: |
          if [ -f package.json ]; then
            npx tsc --noEmit 2>/dev/null || echo "TypeScript check complete (warnings may exist)"
          fi

      - name: Build
        run: |
          if [ -f package.json ]; then
            npm run build
          fi

      - name: Validate build output
        run: |
          if [ -d dist ]; then
            if [ ! -f dist/index.html ]; then
              echo "ERROR: dist/index.html missing"
              exit 1
            fi
            if ! grep -q 'id="root"' dist/index.html; then
              echo "ERROR: dist/index.html missing root div"
              exit 1
            fi
            js_count=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
            css_count=$(find dist/assets -name "*.css" 2>/dev/null | wc -l)
            echo "Build output: index.html + $js_count JS + $css_count CSS bundles"
          else
            echo "WARNING: dist/ not found — skipping build validation"
          fi

      - name: Scan dependencies (npm audit)
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high 2>/dev/null || echo "npm audit complete (vulnerabilities may exist)"
          fi

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ─── SECURITY SCAN ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: TruffleHog (deep scan)
        uses: trufflesecurity/trufflehog@v3.82.0
        with:
          path: ./
          base: main
          head: HEAD
        continue-on-error: true

  # ─── INTEGRATION TESTS ──────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [ml, backend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: ml/

      - name: Install dependencies
        run: |
          cd ..
          uv sync
          cd backend

      - name: Run integration tests
        run: |
          uv run pytest tests/ -v -k "test_predict" --tb=short

  # ─── DOCKER BUILD ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ml, backend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: ml/

      - name: Download model hash
        uses: actions/download-artifact@v4
        with:
          name: model-pkl-sha256
          path: ml/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.tags.outputs.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record deployed image for rollback
        run: |
          echo "Deployed image: ghcr.io/${{ github.repository }}/backend:${{ steps.tags.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "To rollback: use the previous image tag from ghcr.io/${{ github.repository }}/backend" >> $GITHUB_STEP_SUMMARY

  # ─── DEPLOY ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ml, backend, security, docker, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: ml/

      - name: Download model hash
        uses: actions/download-artifact@v4
        with:
          name: model-pkl-sha256
          path: ml/

      # ── Backend: Railway ──
      - name: Deploy backend to Railway
        uses: bervProject/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: backend
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
        continue-on-error: true

      # ── Frontend: Vercel (conditional) ──
      - name: Deploy frontend to Vercel
        if: hashFiles('frontend/package.json') != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
        continue-on-error: true

      - name: Notify deploy status
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend → Railway" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend → Vercel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Model Caching" >> $GITHUB_STEP_SUMMARY
          echo "Backend startup checks for cached model.pkl — skips training if found." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback" >> $GITHUB_STEP_SUMMARY
          echo "To rollback, redeploy the previous Docker image tag from:" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/backend:<previous-tag>" >> $GITHUB_STEP_SUMMARY
