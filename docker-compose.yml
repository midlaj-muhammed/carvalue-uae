version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: carvalue
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:changeme@postgres:5432/carvalue
      MODEL_PATH: /app/ml/model.pkl
      MODEL_CACHE_DIR: /app/ml/registry
      ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./ml:/app/ml:ro
      - model-cache:/app/ml/registry
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "if [ ! -f /app/ml/model.pkl ]; then
        echo 'No cached model found — training...';
        uv run python ml/train.py;
      else
        echo 'Cached model found — skipping training.';
      fi && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  model-cache:
